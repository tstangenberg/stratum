coverage:
  precision: 2
  round: down

  status:
    project:
      default:
        # cmd/ (main entry point) and generated files are excluded — see ignore list.
        # Every testable line must be covered.
        target: 100%
        threshold: 1%
    patch:
      default:
        # Every new line shipped in a PR must be covered.
        target: 100%
        threshold: 1%

ignore:
  - "internal/api/"   # generated by oapi-codegen — do not count toward coverage
  - "cmd/"            # main() calls http.ListenAndServe — not unit-testable
