coverage:
  precision: 2
  round: down

  status:
    project:
      default:
        # Conservative floor based on actual coverage at time of setup (internal/server: 44%).
        # Generated files (internal/api/) and cmd/ are excluded — see ignore list below.
        # Raise this threshold as real endpoint handlers replace the 501 stubs.
        target: 40%
        threshold: 1%
    patch:
      default:
        # New code shipped in a PR should be at least 70% covered.
        target: 70%
        threshold: 1%

ignore:
  - "internal/api/"   # generated by oapi-codegen — do not count toward coverage
