name: Story Status

on:
  pull_request:
    types: [opened, ready_for_review, closed]

jobs:
  update:
    name: update story status
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'story/US-')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.BOT_TOKEN }}

      - name: Resolve story and status
        id: resolve
        run: |
          BRANCH="${{ github.head_ref }}"
          STORY_ID=$(echo "$BRANCH" | grep -oE 'US-[0-9]{4}')

          if [ -z "$STORY_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILE=$(find docs/stories -name "${STORY_ID}-*.md" | head -1)
          if [ -z "$FILE" ]; then
            echo "::warning::No story file found for $STORY_ID — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ACTION="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"
          DRAFT="${{ github.event.pull_request.draft }}"

          if [ "$ACTION" = "opened" ] && [ "$DRAFT" = "true" ]; then
            STATUS="in-progress"
          elif [ "$ACTION" = "opened" ]; then
            STATUS="in-review"
          elif [ "$ACTION" = "ready_for_review" ]; then
            STATUS="in-review"
          elif [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            STATUS="done"
          elif [ "$ACTION" = "closed" ]; then
            STATUS="ready"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "story_id=$STORY_ID" >> "$GITHUB_OUTPUT"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update story status and promote unblocked
        if: steps.resolve.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          FILE="${{ steps.resolve.outputs.file }}"
          STATUS="${{ steps.resolve.outputs.status }}"
          STORY_ID="${{ steps.resolve.outputs.story_id }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/story-${STORY_ID}-${STATUS}-$(date +%s)"
          git checkout -b "$BRANCH"

          sed -i "s/^status: .*/status: $STATUS/" "$FILE"
          git add "$FILE"

          if [ "$STATUS" = "done" ]; then
            for candidate in docs/stories/*.md; do
              grep -q "^depends_on:" "$candidate" || continue
              grep -q "^status: blocked" "$candidate" || continue
              grep -q "$STORY_ID" "$candidate" || continue

              DEPS=$(grep "^depends_on:" "$candidate" | sed 's/depends_on: \[//' | tr -d '[]' | tr ',' '\n' | tr -d ' ')
              all_done=true
              for dep in $DEPS; do
                dep_file=$(find docs/stories -name "${dep}-*.md" | head -1)
                if [ -z "$dep_file" ]; then
                  all_done=false; break
                fi
                grep -q "^status: done" "$dep_file" || { all_done=false; break; }
              done

              if [ "$all_done" = "true" ]; then
                CANDIDATE_ID=$(grep "^id:" "$candidate" | awk '{print $2}')
                sed -i "s/^status: blocked/status: ready/" "$candidate"
                git add "$candidate"
              fi
            done
          fi

          git diff --staged --quiet && echo "Status already $STATUS — nothing to commit" && exit 0

          COMMIT_MSG="chore: story $STORY_ID → $STATUS [skip ci]"
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"
          gh pr create \
            --title "$COMMIT_MSG" \
            --body "Automated story status update." \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --squash
