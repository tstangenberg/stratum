name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: tstangenberg/stratum
          files: coverage.out
          fail_ci_if_error: false

  spec-lint:
    name: spec-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2 lint api/openapi.yaml

  codegen-drift:
    name: codegen-drift
    runs-on: ubuntu-latest
    needs: [spec-lint]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check codegen drift
        run: |
          go tool oapi-codegen --config api/oapi-codegen.yaml api/openapi.yaml
          if ! git diff --quiet internal/api/api.gen.go; then
            echo ""
            echo "Generated code is out of sync with the OpenAPI spec."
            echo "Run the following to regenerate:"
            echo "  go tool oapi-codegen --config api/oapi-codegen.yaml api/openapi.yaml"
            exit 1
          fi

  license:
    name: license
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check license headers
        uses: apache/skywalking-eyes/header@v0.8.0
