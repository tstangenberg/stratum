name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  spec-lint:
    name: spec-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2 lint api/openapi.yaml

  license:
    name: license
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check license headers
        run: |
          go run github.com/google/addlicense \
            -check -l agpl -c "Thorben Stangenberg" -s=only \
            -ignore "**/*.gen.go" \
            ./cmd ./tools ./internal 2>&1 || {
            echo ""
            echo "Missing SPDX headers. Run locally to fix:"
            echo "  go run github.com/google/addlicense -l agpl -c \"Thorben Stangenberg\" -s=only -ignore \"**/*.gen.go\" ./cmd ./tools ./internal"
            exit 1
          }
