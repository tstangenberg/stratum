<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratum</title>
    <link rel="stylesheet" href="/ui/static/style.css">
    <script src="/ui/static/htmx.min.js"></script>
    {{if eq .Page "schema"}}
    <link rel="stylesheet" href="/ui/static/codemirror.css">
    <script src="/ui/static/codemirror.js"></script>
    <script src="/ui/static/graphql-web.js"></script>
    {{end}}
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <h2>Stratum</h2>
            <ul>
                <li><a href="/ui/status">Status</a></li>
                <li><a href="/ui/schema">Schema</a></li>
                <li><a href="/ui/console">Console</a></li>
            </ul>
            <div class="api-key-section">
                <label for="api-key">API Key</label>
                <input type="password" id="api-key" name="api-key" placeholder="Enter API key">
            </div>
        </nav>
        <main class="content">
            {{if eq .Page "schema"}}{{template "schema_content" .}}{{else}}{{template "status_content" .}}{{end}}
        </main>
    </div>
    <script>
        (function() {
            var input = document.getElementById('api-key');
            var stored = localStorage.getItem('stratum-api-key');
            if (stored) { input.value = stored; }
            input.addEventListener('input', function() {
                localStorage.setItem('stratum-api-key', input.value);
            });
        })();
    </script>
    {{if eq .Page "schema"}}
    <script src="/ui/static/schema.js"></script>
    {{end}}
</body>
</html>
