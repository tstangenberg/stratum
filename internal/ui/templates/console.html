{{define "console_content"}}
<h1>Console</h1>

<div class="console-layout">
    <section class="console-input">
        <div class="form-group">
            <label for="schema-select">Schema</label>
            <select id="schema-select">
                {{if .Schemas}}
                    {{range .Schemas}}
                    <option value="{{.Name}}">{{.Name}}</option>
                    {{end}}
                {{else}}
                    <option value="" disabled selected>Kein Schema vorhanden</option>
                {{end}}
            </select>
        </div>
        <div class="form-group">
            <label for="query-input">Query</label>
            <textarea id="query-input" rows="10" placeholder="{ typeName { list { id } } }"></textarea>
        </div>
        <div class="button-group">
            <button type="button" id="btn-execute" class="btn btn-primary" onclick="executeQuery()">Ausführen</button>
        </div>
    </section>

    <section class="console-output">
        <h2>Ergebnis</h2>
        <pre id="result-output" class="result-box"></pre>
    </section>
</div>
{{end}}
